services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskengine
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api-server:
    build: ./src/services/api
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgres://admin:secret@postgres:5432/taskengine
      REDIS_URL: redis://redis:6379
      PORT: 5090
    ports:
      - "5090:5090"

  coordinator:
    build: ./src/services/orchestrator
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgres://admin:secret@postgres:5432/taskengine
      REDIS_URL: redis://redis:6379

  worker:
    build: ./src/services/workers
    depends_on: [redis]
    environment:
      REDIS_URL: redis://redis:6379
    deploy:
      replicas: 3

volumes:
  pgdata:
